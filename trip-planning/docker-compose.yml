# Trip Planning — fully-containerised multi-node stack (BullMQ / Redis).
#
#   docker compose -f trip-planning/docker-compose.yml --env-file .env up -d --build
#   docker compose -f trip-planning/docker-compose.yml run --rm orchestrator
#
# Board: open viewer/board.html (connects to the gateway on :3000).
x-worker-env: &worker-env
  REDIS_URL: redis://redis:6379
  MESSAGING_DRIVER: bullmq
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
  TAVILY_API_KEY: ${TAVILY_API_KEY:-}
  SERPER_API_KEY: ${SERPER_API_KEY:-}

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "node_modules/kaiban-distributed/dist/src/main/index.js"]
    ports: ["3000:3000"]
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: bullmq
      PORT: "3000"
      SERVICE_NAME: kaiban-gateway
      ROLE: gateway
      AGENT_IDS: gateway
      VALID_HITL_DECISIONS: ${VALID_HITL_DECISIONS:-PUBLISH,REVISE,REJECT}
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  city-selector:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/trip-planning/city-selector-node.js"]
    depends_on:
      redis: { condition: service_healthy }
    environment:
      <<: *worker-env
      AGENT_ID: city-selector
    restart: on-failure
    healthcheck: { disable: true }

  local-expert:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/trip-planning/local-expert-node.js"]
    depends_on:
      redis: { condition: service_healthy }
    environment:
      <<: *worker-env
      AGENT_ID: local-expert
    restart: on-failure
    healthcheck: { disable: true }

  concierge:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/trip-planning/concierge-node.js"]
    depends_on:
      redis: { condition: service_healthy }
    environment:
      <<: *worker-env
      AGENT_ID: concierge
    restart: on-failure
    healthcheck: { disable: true }

  # Interactive orchestrator (HITL). Not started automatically:
  #   docker compose -f trip-planning/docker-compose.yml run --rm orchestrator
  orchestrator:
    profiles: ["cli-only"]
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/trip-planning/orchestrator.js"]
    depends_on:
      gateway: { condition: service_healthy }
    environment:
      GATEWAY_URL: http://gateway:3000
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: bullmq
      ORIGIN: ${ORIGIN:-New York}
      DATES: ${DATES:-a long weekend next month}
      INTERESTS: ${INTERESTS:-history, food, and architecture}
      BUDGET: ${BUDGET:-1500 USD}
      MAX_WORKFLOW_COST_USD: ${MAX_WORKFLOW_COST_USD:-0.50}
      MAX_WORKFLOW_TOKENS: ${MAX_WORKFLOW_TOKENS:-0}
    stdin_open: true
    tty: true
    healthcheck: { disable: true }
