# Social Media Team — Kafka edition (same fan-out/fan-in workflow, Kafka transport).
#
#   docker compose -f social-media-team/docker-compose.kafka.yml --env-file .env up -d --build
#   docker compose -f social-media-team/docker-compose.kafka.yml run --rm orchestrator
x-worker-env: &worker-env
  REDIS_URL: redis://redis:6379
  MESSAGING_DRIVER: kafka
  KAFKA_BROKERS: kafka:29092
  KAFKA_GROUP_ID: kaiban-group
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper: { condition: service_healthy }
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  gateway:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "node_modules/kaiban-distributed/dist/src/main/index.js"]
    ports: ["3000:3000"]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: kaiban-gateway
      KAFKA_GROUP_ID: kaiban-group
      PORT: "3000"
      SERVICE_NAME: kaiban-gateway
      ROLE: gateway
      AGENT_IDS: gateway
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  extractor:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/social-media-team/extractor-node.js"]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *worker-env
      KAFKA_CLIENT_ID: kaiban-extractor
      AGENT_ID: extractor
    restart: on-failure
    healthcheck: { disable: true }

  tweet:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/social-media-team/composer-node.js"]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *worker-env
      KAFKA_CLIENT_ID: kaiban-tweet
      AGENT_ID: tweet
    restart: on-failure
    healthcheck: { disable: true }

  linkedin:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/social-media-team/composer-node.js"]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *worker-env
      KAFKA_CLIENT_ID: kaiban-linkedin
      AGENT_ID: linkedin
    restart: on-failure
    healthcheck: { disable: true }

  discord:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/social-media-team/composer-node.js"]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *worker-env
      KAFKA_CLIENT_ID: kaiban-discord
      AGENT_ID: discord
    restart: on-failure
    healthcheck: { disable: true }

  blog:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/social-media-team/composer-node.js"]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *worker-env
      KAFKA_CLIENT_ID: kaiban-blog
      AGENT_ID: blog
    restart: on-failure
    healthcheck: { disable: true }

  aggregator:
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/social-media-team/aggregator-node.js"]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *worker-env
      KAFKA_CLIENT_ID: kaiban-aggregator
      AGENT_ID: aggregator
    restart: on-failure
    healthcheck: { disable: true }

  orchestrator:
    profiles: ["cli-only"]
    build: { context: .., dockerfile: Dockerfile }
    command: ["node", "dist/social-media-team/orchestrator.js"]
    depends_on:
      gateway: { condition: service_healthy }
    environment:
      GATEWAY_URL: http://gateway:3000
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: kaiban-orchestrator
      KAFKA_GROUP_ID: kaiban-orchestrator-group
      PROJECT: ${PROJECT:-KaibanJS}
      RELEASE_NOTES: ${RELEASE_NOTES:-}
      MAX_WORKFLOW_COST_USD: ${MAX_WORKFLOW_COST_USD:-0.50}
      MAX_WORKFLOW_TOKENS: ${MAX_WORKFLOW_TOKENS:-0}
    stdin_open: true
    tty: true
    healthcheck: { disable: true }
